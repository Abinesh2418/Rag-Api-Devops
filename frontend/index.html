<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG API - DevOps Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 1.8em;
            color: #fff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header p {
            color: #888;
            margin-top: 6px;
            font-size: 0.9em;
        }

        .card {
            background: #1a1d27;
            border: 1px solid #2a2d3e;
            border-radius: 10px;
            padding: 28px;
            width: 100%;
            max-width: 640px;
            margin-bottom: 20px;
        }

        .query-row {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #0f1117;
            border: 1px solid #2a2d3e;
            border-radius: 6px;
            padding: 10px 14px;
            color: #e0e0e0;
            font-size: 0.95em;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #5c6bc0; }

        button {
            background: #5c6bc0;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 22px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            transition: background 0.2s;
        }

        button:hover { background: #3f51b5; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .answer {
            margin-top: 18px;
            padding: 14px;
            background: #0f1117;
            border-left: 3px solid #5c6bc0;
            border-radius: 4px;
            font-size: 0.9em;
            line-height: 1.6;
            display: none;
        }

        .answer.show { display: block; }

        .answer .label {
            color: #888;
            font-size: 0.8em;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .error {
            margin-top: 12px;
            color: #ef5350;
            font-size: 0.85em;
            display: none;
        }

        .error.show { display: block; }

        .stats {
            display: flex;
            gap: 12px;
        }

        .stat {
            flex: 1;
            background: #1a1d27;
            border: 1px solid #2a2d3e;
            border-radius: 10px;
            padding: 18px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.6em;
            font-weight: 600;
            color: #5c6bc0;
        }

        .stat-label {
            font-size: 0.78em;
            color: #666;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .links {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .link {
            flex: 1;
            text-align: center;
            padding: 9px;
            border: 1px solid #2a2d3e;
            border-radius: 6px;
            color: #888;
            font-size: 0.82em;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
        }

        .link:hover { border-color: #5c6bc0; color: #5c6bc0; }

        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid #444;
            border-top-color: #5c6bc0;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>RAG API DevOps Dashboard</h1>
        <p>Ask questions from your docs · Powered by FastAPI + ChromaDB</p>
    </div>

    <!-- Query Card -->
    <div class="card">
        <div class="query-row">
            <input id="q" type="text" placeholder="Ask anything… e.g. What is Kubernetes?" />
            <button id="btn" onclick="ask()">Ask</button>
        </div>
        <div class="answer" id="answer">
            <div class="label">Answer</div>
            <div id="answer-text"></div>
        </div>
        <div class="error" id="error"></div>
    </div>

    <!-- Stats -->
    <div class="stats" style="width:100%;max-width:640px;margin-bottom:20px;">
        <div class="stat">
            <div class="stat-value" id="total">—</div>
            <div class="stat-label">Total Queries</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="latency">—</div>
            <div class="stat-label">Last Response</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="status">—</div>
            <div class="stat-label">API Status</div>
        </div>
    </div>

    <!-- Quick Links -->
    <div class="links" style="width:100%;max-width:640px;">
        <a class="link" href="http://localhost:8000/docs" target="_blank">📄 API Docs</a>
        <a class="link" href="http://localhost:9090" target="_blank">📊 Prometheus</a>
        <a class="link" href="http://localhost:3001/d/rag-api-monitoring" target="_blank">📈 Grafana</a>
    </div>

    <script>
        let queryCount = 0;

        async function ask() {
            const q = document.getElementById('q').value.trim();
            if (!q) return;

            const btn = document.getElementById('btn');
            const answerDiv = document.getElementById('answer');
            const errorDiv = document.getElementById('error');

            errorDiv.classList.remove('show');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Asking…';

            const t0 = Date.now();
            try {
                const res = await fetch(`/query?q=${encodeURIComponent(q)}`, { method: 'POST' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const ms = Date.now() - t0;

                document.getElementById('answer-text').textContent = data.answer;
                answerDiv.classList.add('show');
                document.getElementById('q').value = '';

                queryCount++;
                document.getElementById('total').textContent = queryCount;
                document.getElementById('latency').textContent = (ms / 1000).toFixed(2) + 's';
                document.getElementById('status').textContent = '✓ Up';
            } catch (e) {
                errorDiv.textContent = 'Could not reach backend. Is docker-compose running?';
                errorDiv.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Ask';
            }
        }

        document.getElementById('q').addEventListener('keydown', e => {
            if (e.key === 'Enter') ask();
        });

        // Ping backend on load
        fetch('/query?q=ping', { method: 'POST' })
            .then(() => document.getElementById('status').textContent = '✓ Up')
            .catch(() => document.getElementById('status').textContent = '✗ Down');
    </script>
</body>
</html>
