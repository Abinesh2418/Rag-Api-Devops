name: Devops

services:
  # Backend Service - FastAPI
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: devops-backend
    ports:
      - "8000:8000"
    environment:
      - USE_MOCK_LLM=1
      - LOG_LEVEL=INFO
    volumes:
      - ./db:/app/db
      - ./backend:/app/backend
      - ./docs:/app/docs
    networks:
      - devops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on: []

  # Frontend Service - Nginx
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: devops-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - devops-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  devops-network:
    driver: bridge

volumes:
  db-volume:
    driver: local

